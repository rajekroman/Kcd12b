<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#15120d" />
    <meta name="description" content="Chronicles of Bohemia — 12bitové historické arkádové RPG." />
    <title>Chronicles of Bohemia</title>
  </head>
  <body>
    <div id="app" aria-label="Herní obrazovka"></div>
    <div id="mobile-controls" aria-label="Dotykové ovládání">
      <div class="dpad" aria-label="Pohyb">
        <button type="button" data-control="up" aria-label="Nahoru">▲</button>
        <button type="button" data-control="left" aria-label="Doleva">◀</button>
        <button type="button" data-control="down" aria-label="Dolů">▼</button>
        <button type="button" data-control="right" aria-label="Doprava">▶</button>
      </div>
      <div class="actions" aria-label="Akce">
        <button type="button" data-control="interact">Mluv</button>
        <button type="button" data-control="attack">Útok</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
