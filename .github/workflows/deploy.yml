name: Test and deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - name: Apply melee impact range integration
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 3
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/game/scenes/GameScene.ts')
          content = path.read_text()
          import_old = "  getAttackDirectionLabel,\n  resolveDefense,"
          import_new = "  getAttackDirectionLabel,\n  isWithinMeleeImpactRange,\n  resolveDefense,"
          impact_old = "    this.pendingBanditAttack = undefined;\n    if (time < this.invulnerableUntil) {"
          impact_new = """    this.pendingBanditAttack = undefined;
    const impactDistance = Phaser.Math.Distance.BetweenPoints(this.player, this.bandit);
    if (!isWithinMeleeImpactRange(impactDistance)) {
      EventBus.emit(GameEvents.MESSAGE, 'Ustoupil jsi mimo dosah lapkova útoku.');
      this.emitHud();
      return;
    }

    if (time < this.invulnerableUntil) {"""

          if import_old in content:
              content = content.replace(import_old, import_new, 1)
          elif 'isWithinMeleeImpactRange' not in content:
              raise SystemExit('CombatSystem import anchor not found')

          if impact_old in content:
              content = content.replace(impact_old, impact_new, 1)
          elif 'impactDistance' not in content:
              raise SystemExit('Bandit impact anchor not found')

          path.write_text(content)
          PY
      - name: Commit melee range integration
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 3
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet -- src/game/scenes/GameScene.ts; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/game/scenes/GameScene.ts
          git commit -m "fix: cancel bandit impact outside melee range"
          git push origin "HEAD:${HEAD_BRANCH}"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --no-audit --no-fund --prefer-offline
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test -- --run
      - name: Production build
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm run test:e2e
      - name: Upload Playwright diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 3
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'pull_request'
        with:
          path: dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
