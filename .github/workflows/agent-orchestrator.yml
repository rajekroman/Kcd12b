name: Agent Orchestrator

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Plan from the deterministic fixture without GitHub writes or API key
        required: true
        type: boolean
        default: true
  schedule:
    - cron: "17 * * * *"
  workflow_run:
    workflows: [quality]
    types: [completed]

concurrency:
  group: agent-orchestrator-${{ github.repository }}
  cancel-in-progress: false

jobs:
  orchestrate:
    if: github.event_name == 'issues' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out orchestrator source
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Test orchestrator
        run: npm --prefix tools/agent-orchestrator test

      - name: Preserve control-plane executable
        run: cp -R tools/agent-orchestrator /tmp/agent-orchestrator

      - name: Build deterministic plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            node /tmp/agent-orchestrator/src/cli.mjs plan \
              --dry-run \
              --fixture /tmp/agent-orchestrator/test/fixtures/issues.json
          else
            node /tmp/agent-orchestrator/src/cli.mjs plan --lock
          fi

      - name: Stop after dry-run plan
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: cat .agent-orchestrator/plan.json

      - name: Verify OpenAI secret
        if: steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "$OPENAI_API_KEY" ]]; then
            mkdir -p .agent-orchestrator
            printf '%s\n' \
              'OPENAI_API_KEY is not configured. The issue was safely moved to blocked; no code was generated or merged.' \
              > .agent-orchestrator/BLOCKED.md
            exit 1
          fi

      - name: Check out work-package branch
        if: steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          BASE_SHA: ${{ steps.plan.outputs.base_sha }}
          BRANCH: ${{ steps.plan.outputs.branch }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_SHA" "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
          git merge-base --is-ancestor "$BASE_SHA" "origin/$BRANCH" || {
            printf 'Branch %s does not descend from required base %s.\n' "$BRANCH" "$BASE_SHA" \
              > .agent-orchestrator/BLOCKED.md
            exit 1
          }
          git checkout -B "$BRANCH" "origin/$BRANCH"

      - name: Run specialist agent
        id: codex
        if: steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: ${{ steps.plan.outputs.prompt_file }}
          sandbox: workspace-write
          safety-strategy: drop-sudo

      - name: Validate generated work
        if: steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        run: |
          set -euo pipefail
          test ! -f .agent-orchestrator/BLOCKED.md
          test -s .agent-orchestrator/HANDOFF.md
          npm run lint
          npm run typecheck
          npm test
          npm run build
          npm run test:e2e
          npm --prefix /tmp/agent-orchestrator test

      - name: Commit and push work package
        id: push
        if: steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          BRANCH: ${{ steps.plan.outputs.branch }}
          ISSUE_NUMBER: ${{ steps.plan.outputs.issue_number }}
          ROLE: ${{ steps.plan.outputs.role }}
          PUSH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cp .agent-orchestrator/HANDOFF.md /tmp/HANDOFF.md
          rm -rf .agent-orchestrator
          git add -A
          if git diff --cached --quiet; then
            printf 'The specialist produced no repository changes.\n' > /tmp/BLOCKED.md
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat(${ROLE,,}): complete issue #${ISSUE_NUMBER}"
          HEAD_SHA="$(git rev-parse HEAD)"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:refs/heads/${BRANCH}"
          git remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Create draft PR and HANDOFF
        if: steps.push.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node /tmp/agent-orchestrator/src/cli.mjs finalize \
            --plan-file .agent-orchestrator/plan.json \
            --summary-file /tmp/HANDOFF.md \
            --head-sha "${{ steps.push.outputs.head_sha }}"

      - name: Return failed run to blocked
        if: failure() && steps.plan.outputs.should_run == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set +e
          if [[ -f /tmp/BLOCKED.md && ! -f .agent-orchestrator/BLOCKED.md ]]; then
            mkdir -p .agent-orchestrator
            cp /tmp/BLOCKED.md .agent-orchestrator/BLOCKED.md
          fi
          node /tmp/agent-orchestrator/src/cli.mjs block \
            --plan-file .agent-orchestrator/plan.json \
            --reason-file .agent-orchestrator/BLOCKED.md \
            --reason "Workflow failed before a complete HANDOFF. Inspect run $GITHUB_RUN_ID."

  reconcile:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: read
      checks: read
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Reconcile orphaned locks and CI state
        run: node tools/agent-orchestrator/src/cli.mjs reconcile --stale-hours 6
