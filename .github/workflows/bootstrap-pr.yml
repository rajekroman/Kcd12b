name: Bootstrap project from pull request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/bootstrap'
    runs-on: ubuntu-latest
    steps:
      - name: Check out bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap
          fetch-depth: 0

      - name: Expand validated project archive
        shell: bash
        run: |
          set -euo pipefail
          echo "Bootstrap chunk hashes:"
          for file in .bootstrap/chunk-*; do
            printf '%s ' "$(basename "$file")"
            git hash-object "$file"
          done
          cat .bootstrap/chunk-* | base64 --decode > /tmp/kcd12b-project.tar.gz
          echo "9d7cbd7afd9fbd2f6fbcb6a622bb0d9611f8b210e7635b15977fdf0f5e832b07  /tmp/kcd12b-project.tar.gz" | sha256sum --check -
          tar -xzf /tmp/kcd12b-project.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run lint
          npm run typecheck
          npm test -- --run
          npm run build

      - name: Commit validated project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap Chronicles of Bohemia vertical slice"
          git push origin HEAD:agent/bootstrap
