name: Bootstrap project from pull request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/bootstrap'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: agent/bootstrap
          fetch-depth: 0

      - name: Expand verified project archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/chunk-* | base64 --decode > /tmp/kcd12b-project.tar.gz
          echo "9d7cbd7afd9fbd2f6fbcb6a622bb0d9611f8b210e7635b15977fdf0f5e832b07  /tmp/kcd12b-project.tar.gz" | sha256sum --check -
          tar -xzf /tmp/kcd12b-project.tar.gz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap.yml

      - name: Commit verified project sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: bootstrap Chronicles of Bohemia vertical slice"
          git push origin HEAD:agent/bootstrap
